name: Pipeline con Dependencias

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar formato
        run: |
          echo "❌ Error de prueba"
          exit 1

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Ejecutar pruebas
        run: echo "✅ Tests ejecutados correctamente"

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Desplegar
        run: |
          echo "🚀 Desplegando en producción..."
          echo "✅ Deploy exitoso - Versión: ${{ github.sha }}"